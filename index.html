        <script>
            function fetchWFScookedbd_marine_protected_areas_0Data(title, callback) {
                var url = "http://102.37.144.124:8080/geoserver/cooked/wfs?SERVICE=WFS&VERSION=1.0.0&REQUEST=GetFeature&TYPENAME=cooked:bd_marine_protected_areas&SRSNAME=EPSG:3857";

                function fetchWithFallback(u) {
                    return fetch(u)
                        .then(function (r) {
                            if (!r.ok) throw new Error("Bad response");
                            return r.text();
                        })
                        .catch(function () {
                            // Fallback AllOrigins
                            return fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(u))
                                .then(function (r) {
                                    if (!r.ok) throw new Error("Proxy failed");
                                    return r.text();
                                });
                        });
                }

                // Imposta un'icona di caricamento durante il fetch
                lyr_cookedbd_marine_protected_areas_0.set('title', '<div class="roller-switcher" title="Fetching WFS data"></div> ' + title);
                fetchWithFallback(url)
                    .then(function (response) {
                        if (typeof callback === "function") {
                            lyr_cookedbd_marine_protected_areas_0.set('title', title);
                            layerSwitcher.renderPanel();
                            callback(null, response); // Pass null as error
                        } else {
                            console.error("Callback not defined.");
                        }
                    })
                    .catch(function (error) {
                        if (typeof callback === "function") {
                            lyr_cookedbd_marine_protected_areas_0.set('title', '<i class="fa fa-exclamation-triangle" title="Error on fetch data"></i> ' + title);
                            layerSwitcher.renderPanel();
                            callback(error, null); // Pass the error
                        } else {
                            lyr_cookedbd_marine_protected_areas_0.set('title', '<i class="fa fa-exclamation-triangle" title="Error on fetch data"></i> ' + title);
                            layerSwitcher.renderPanel();
                            console.error("Error fetching cookedbd_marine_protected_areas_0 data:", error);
                        }
                    });
            }
        </script>
